<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ station_name }}</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <main class="radio-shell">
    <section class="hero-card">
      <p class="eyebrow">Signal locked</p>
      <h1>{{ station_name }}</h1>

      <img
        class="band-photo"
        src="/static/images/hooj01.jpeg"
        alt="Hoojshwah band photo"
      >

      <p class="tagline">
        An unlisted simulated-live station broadcasting original Hoojshwah music.
      </p>

      <div class="player-card">
        <p class="label">Now Airing</p>
        <h2 id="now-title">Tuning station...</h2>
        <p id="now-artist">Hoojshwah</p>

        <div class="button-row">
          <button id="play-button" type="button">Play Signal</button>
          <button id="resync-button" type="button">Resync Signal</button>
        </div>

        <p class="next">
          Up Next: <span id="up-next">...</span>
        </p>

        <div class="station-details">
        </div>

        <audio id="radio-audio" preload="metadata"></audio>
      </div>

      <section class="share-card">
        <p class="label">Share the Signal</p>
        <p class="share-url">https://hoojshwah-radio-live.onrender.com/</p>
        <button id="share-button" type="button">Copy Station Link</button>
        <p id="share-status" class="signal-status"></p>
      </section>

      <section class="track-list-card">
        <p class="label">On the Station</p>
        <ul id="track-list"></ul>
      </section>
    </section>
  </main>

  <script src="/static/js/player.js"></script>
</body>
</html>
