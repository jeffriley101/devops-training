<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} · Woodshed Woodchuck</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="site-header wood-panel">
      <p class="eyebrow">Practice. Grow. Play. Repeat.</p>
      <h1 class="logo">The Woodshed Woodchuck</h1>
      <p class="mentor-line">{{ sax_viking_welcome }}</p>
    </header>

    <main class="content-wrap">
      {% block content %}{% endblock %}
    </main>

    {% if nav_items and active_nav %}
    <nav class="main-nav" aria-label="Primary navigation">
      {% for item in nav_items %}
      <a class="nav-pill {% if item.key == active_nav %}active{% endif %}" href="{{ item.href }}">{{ item.label }}</a>
      {% endfor %}
    </nav>
    {% endif %}
  </div>

  <script id="quest-pool-data" type="application/json">{{ quest_pool | tojson }}</script>
  <script id="sax-viking-messages-data" type="application/json">{{ sax_viking_messages | tojson }}</script>
  <script src="/static/js/state.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
