name: terraform-ci

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        stack:
          - environments/shared-iam
          - environments/dev
          - environments/stage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      # 1) Formatting (run once per job execution; it's fine if it repeats per matrix)
      - name: terraform fmt (check)
        run: terraform fmt -check -recursive

      # 2) Validate each stack without needing AWS/backend access
      - name: terraform init (no backend)
        working-directory: ${{ matrix.stack }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ matrix.stack }}
        run: terraform validate

      # 3) Optional PLAN (requires AWS creds + real backend). We’ll enable this later.
      - name: terraform plan (optional, requires AWS creds)
        if: ${{ false }}
        working-directory: ${{ matrix.stack }}
        run: |
          terraform init
          terraform plan -no-color
